<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Much Bar - Login System</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

    <!-- TELA DE LOGIN -->
    <div id="tela-login" class="flex flex-col items-center justify-center min-h-screen p-4">
        <div class="bg-gray-900 p-8 rounded-2xl border border-gray-800 shadow-2xl w-full max-w-sm">
            <h1 class="text-2xl font-black text-white mb-6 text-center">MUCH<span class="text-amber-500">BAR</span></h1>
            
            <div id="login-form-pin" class="space-y-4">
                <p class="text-xs text-gray-500 uppercase text-center mb-4">Acesso Administrativo (Abel)</p>
                <input type="password" id="login-pin-input" placeholder="PIN do Administrador" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 text-center text-xl tracking-widest">
                <button onclick="tentarLoginAdmin()" class="w-full bg-amber-600 hover:bg-amber-500 text-black font-bold p-3 rounded-lg">Entrar como Administrador</button>
            </div>

            <div id="login-form-user" class="space-y-4 mt-8 border-t border-gray-800 pt-6">
                <p class="text-xs text-gray-500 uppercase text-center mb-4">Acesso Funcionários</p>
                <input type="text" id="login-user-name" placeholder="Utilizador" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 text-sm">
                <input type="password" id="login-user-pass" placeholder="Password" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 text-sm">
                <button onclick="tentarLoginFuncionario()" class="w-full bg-gray-700 hover:bg-gray-600 text-white font-bold p-3 rounded-lg">Entrar</button>
            </div>
        </div>
    </div>

    <!-- PAINEL PRINCIPAL (Oculto) -->
    <div id="sistema-conteudo" class="hidden">
        <nav class="bg-gray-900 p-4 border-b border-amber-500 flex justify-between items-center">
            <h2 class="font-bold">Bem-vindo, <span id="span-nome-user" class="text-amber-500"></span></h2>
            <button onclick="logout()" class="text-sm text-red-400">Sair</button>
        </nav>

        <main class="p-6">
            <!-- Apenas Admin vê isto -->
            <div id="painel-admin" class="hidden bg-gray-900 p-6 rounded-xl border border-gray-700 mb-6">
                <h3 class="text-lg font-bold mb-4">Gerir Funcionários</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <input type="text" id="new-user" placeholder="Username" class="bg-gray-800 p-2 rounded">
                    <input type="password" id="new-pass" placeholder="Password" class="bg-gray-800 p-2 rounded">
                    <button onclick="criarFuncionario()" class="col-span-2 bg-green-600 p-2 rounded font-bold">Criar Funcionário</button>
                </div>
                <div id="lista-funcs" class="text-sm text-gray-400"></div>
            </div>

            <div class="text-center py-20 text-gray-600">Sistema Much Bar Operacional</div>
        </main>
    </div>

    <script>
        // CONFIGURAÇÃO INICIAL
        let db = JSON.parse(localStorage.getItem('muchbar_db')) || {
            adminPin: "1111", // PIN do Abel
            funcionarios: [] // Lista de funcionários: {user, pass}
        };

        function salvar() { localStorage.setItem('muchbar_db', JSON.stringify(db)); }

        // LOGIN ADMINISTRADOR
        function tentarLoginAdmin() {
            if(document.getElementById('login-pin-input').value === db.adminPin) {
                iniciarSessao("Abel (Admin)", true);
            } else { alert("PIN Incorreto!"); }
        }

        // LOGIN FUNCIONÁRIO
        function tentarLoginFuncionario() {
            const user = document.getElementById('login-user-name').value;
            const pass = document.getElementById('login-user-pass').value;
            const func = db.funcionarios.find(f => f.user === user && f.pass === pass);
            
            if(func) {
                iniciarSessao(func.user, false);
            } else { alert("Utilizador ou password incorretos!"); }
        }

        function iniciarSessao(nome, isAdmin) {
            document.getElementById('tela-login').classList.add('hidden');
            document.getElementById('sistema-conteudo').classList.remove('hidden');
            document.getElementById('span-nome-user').innerText = nome;
            
            if(isAdmin) {
                document.getElementById('painel-admin').classList.remove('hidden');
                renderizarListaFuncs();
            }
        }

        function criarFuncionario() {
            const u = document.getElementById('new-user').value;
            const p = document.getElementById('new-pass').value;
            if(u && p) {
                db.funcionarios.push({user: u, pass: p});
                salvar();
                renderizarListaFuncs();
                alert("Funcionário criado!");
            }
        }

        function renderizarListaFuncs() {
            const list = document.getElementById('lista-funcs');
            list.innerHTML = db.funcionarios.map(f => `<div>Utilizador: ${f.user}</div>`).join('');
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
